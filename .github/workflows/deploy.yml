name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

# Permisos para desplegar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Set up Node 💻
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Quitamos la línea de cache: 'npm' para que no busque el package-lock.json

      - name: Install dependencies 🔧
        run: npm install # Usamos 'npm install' en lugar de 'npm ci' para que no falle si falta el lockfile

      - name: Build app 🚀
        run: npm run build

      - name: Setup Pages ⚙️
        uses: actions/configure-pages@v4

      - name: Upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages 🌍
        id: deployment
        uses: actions/deploy-pages@v4
